spring.application.name=KotaCorridor
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:kotacorridor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ✅ ADD THIS ONE LINE BELOW ✅
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false

# JWT
jwt.secret=your-very-long-secret-key-at-least-256-bits-for-hs256-algorithm
jwt.expiration=86400000

# WebSocket
spring.websocket.message-broker.prefix=/topic
spring.websocket.message-broker.application-prefix=/app

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.kotacorridor=DEBUG