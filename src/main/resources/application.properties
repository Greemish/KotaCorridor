spring.application.name=KotaCorridor
server.port=8080

# Database (Supabase PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kotacorridor}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WebSocket
spring.websocket.message-broker.prefix=/topic
spring.websocket.message-broker.application-prefix=/app

logging.level.org.springframework.security=DEBUG
logging.level.com.kotacorridor=DEBUG
